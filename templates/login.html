{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to access your dashboard</p>
        
        <form action="{{ url_for('student_login') }}" method="POST" class="auth-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary w-100 mt-2">Sign In</button>
        </form>
        
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('student_register') }}">Register here</a></p>
    </div>
</div>
{% endblock %}
