<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #0f172a;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .landing-container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        .landing-header {
            margin-bottom: 3rem;
        }

        .landing-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .landing-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .portal-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .portal-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
        }

        .portal-card h2 {
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
            font-weight: 600;
        }

        .portal-card p {
            color: var(--text-muted);
            margin: 0 0 2rem 0;
            line-height: 1.5;
            flex-grow: 1;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 500;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
            box-sizing: border-box;
        }

        .portal-card:hover .btn {
            background-color: var(--primary-hover);
        }

        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="landing-header">
            <h1>University Portal</h1>
            <p>Select your portal to continue</p>
        </div>

        <div class="cards-grid">
            <a href="/student_login" class="portal-card">
                <div class="portal-icon">🎓</div>
                <h2>Student Portal</h2>
                <p>Access your dashboard to submit minor degree applications and view results.</p>
                <div class="btn">Student Login</div>
            </a>

            <a href="/faculty_login" class="portal-card">
                <div class="portal-icon">👨‍🏫</div>
                <h2>Faculty Portal</h2>
                <p>Manage minor degree allocations, analyze student results, and generate reports.</p>
                <div class="btn">Faculty Login</div>
            </a>
        </div>
    </div>
</body>
</html>
